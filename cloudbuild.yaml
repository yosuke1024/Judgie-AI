steps:
  # 1. Build container image (using substitutions to generalize region and image name)
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}',
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:latest',
      '.'
    ]

  # 2. Push container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:latest']

  # 3. Deploy to Cloud Run (conditional configuration for SQLite / PostgreSQL)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        ARGS=(
          "run" "deploy" "${_IMAGE_NAME}"
          "--image" "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}"
          "--region" "${_REGION}"
          "--ingress" "all"
          "--allow-unauthenticated"
        )

        ENV_VARS="APP_ENV=production,OIDC_ENABLED=${_OIDC_ENABLED},OIDC_CLIENT_ID=${_OIDC_CLIENT_ID},OIDC_REDIRECT_URI=${_OIDC_REDIRECT_URI},OIDC_ALLOWED_DOMAINS=${_OIDC_ALLOWED_DOMAINS},OIDC_ALLOWED_EMAILS=${_OIDC_ALLOWED_EMAILS}"
        SECRETS="OIDC_CLIENT_SECRET=OIDC_CLIENT_SECRET:latest"

        if [ "${_DB_TYPE}" = "sqlite" ]; then
          echo "==== Configuring for SQLite + Litestream ===="
          BUCKET="${_LITESTREAM_BUCKET}"
          if [ -z "$$BUCKET" ]; then
            BUCKET="${PROJECT_ID}-judgie-litestream"
          fi
          echo "Using GCS bucket: gs://$$BUCKET"

          # Pre-emptively remove existing secret DATABASE_URL to prevent type conflicts
          echo "Removing conflicting database secrets..."
          gcloud run services update "${_IMAGE_NAME}" \
            --region "${_REGION}" \
            --remove-secrets "DATABASE_URL" || true

          ENV_VARS="$$ENV_VARS,DATABASE_URL=sqlite:////app/data/judgie.db,LITESTREAM_REPLICA_URL=gcs://$$BUCKET/judgie.db"
          
          ARGS+=(
            "--set-env-vars" "$$ENV_VARS"
            "--set-secrets" "$$SECRETS"
            "--max-instances" "1"
            "--no-cpu-throttling"
          )
        else
          echo "==== Configuring for PostgreSQL (Cloud SQL) ===="
          
          # Pre-emptively remove existing env-var DATABASE_URL/LITESTREAM_REPLICA_URL to prevent type conflicts
          echo "Removing conflicting database env vars..."
          gcloud run services update "${_IMAGE_NAME}" \
            --region "${_REGION}" \
            --remove-env-vars "DATABASE_URL,LITESTREAM_REPLICA_URL" || true

          SECRETS="$$SECRETS,DATABASE_URL=${_SECRET_NAME}:latest"
          ARGS+=(
            "--set-env-vars" "$$ENV_VARS"
            "--set-secrets" "$$SECRETS"
            "--add-cloudsql-instances" "${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}"
          )
        fi

        gcloud "$${ARGS[@]}"

# Default values for user-defined substitutions (shown during OSS deployment)
substitutions:
  _REGION: 'us-central1'
  _REPO_NAME: 'judgie-repo'
  _IMAGE_NAME: 'judgie-app'
  _DB_INSTANCE: 'judgie-db'
  _SECRET_NAME: 'DATABASE_URL'
  _OIDC_ENABLED: 'false'
  _OIDC_CLIENT_ID: ''
  _OIDC_REDIRECT_URI: ''
  _OIDC_ALLOWED_DOMAINS: ''
  _OIDC_ALLOWED_EMAILS: ''
  _DB_TYPE: 'sqlite'
  _LITESTREAM_BUCKET: ''

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

