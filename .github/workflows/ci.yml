name: ci.yml

on:
  push:

    branches: [ main, public ]
  pull_request:
    branches: [ main, public ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt -r requirements-dev.txt

    - name: Run Ruff Lint Check
      run: |
        ruff check .

    - name: Run Template Validation
      run: |
        pytest tests/test_templates_validation.py

    - name: Run tests with coverage
      run: |
        # pipefail is required: without it the exit status of `| tee` is tee's,
        # so a failing pytest run would silently pass this step.
        set -o pipefail
        pytest --cov=backend/app --cov-report=term-missing | tee pytest-coverage.txt
        echo "### 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo '```text' >> $GITHUB_STEP_SUMMARY
        cat pytest-coverage.txt | grep -E "Name|TOTAL|backend/app/" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc -b

    - name: Build
      run: npm run build

    # ESLint is reported but not enforced yet: the existing code has 78 errors
    # (60 of them @typescript-eslint/no-explicit-any). Surfacing the count in the
    # job summary keeps the backlog visible so it can be burned down, after which
    # this step should drop continue-on-error and become a blocking check.
    - name: Lint (non-blocking)
      id: lint
      continue-on-error: true
      run: |
        set -o pipefail
        npm run lint 2>&1 | tee eslint.log

    - name: Report lint results
      if: always()
      run: |
        echo "### 🔍 ESLint" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.lint.outcome }}" = "success" ]; then
          echo "No problems found. This step can now be made blocking." >> $GITHUB_STEP_SUMMARY
        else
          echo '```text' >> $GITHUB_STEP_SUMMARY
          grep -E "^✖" eslint.log >> $GITHUB_STEP_SUMMARY || echo "see job log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Known backlog — not blocking this PR." >> $GITHUB_STEP_SUMMARY
        fi

