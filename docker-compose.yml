version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=sqlite:////app/data/judgie.db
      # - DATABASE_URL=postgresql://judgie:judgie123@db:5432/judgie
      - DEFAULT_ADMIN_ID=admin
      - DEFAULT_ADMIN_PASSCODE=admin123
      # Fill this if you want Gemini AI evaluations to work inside container
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - app-data:/app/data

  # Uncomment below if you want to use PostgreSQL instead of SQLite
  # db:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_USER=judgie
  #     - POSTGRES_PASSWORD=judgie123
  #     - POSTGRES_DB=judgie
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  app-data:
  # postgres-data:
