[tool.ruff]
line-length = 120
target-version = "py310"
exclude = [
    ".git",
    "venv",
    "__pycache__",
    ".pytest_cache",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"] # Ignore line length violations (very common in UI/translation code)

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]
